services:
    mows-manager:
        image: mows-manager
        container_name: mows-manager
        build:
            context: "."
            dockerfile: docker/manager.Dockerfile
            additional_contexts:
                mows-package-manager: ../operators/mows-package-manager
                mows-common-rust: ../utils/mows-common-rust
                lock: ../
            args:
                - PROFILE=${PROFILE:-dev} # dev or release
                - SERVICE_NAME=${SERVICE_NAME:-mows-manager}
                - BUILD_UI=${BUILD_UI:-true}
                - BUILD_PACKAGE_MANAGER_CLI=${BUILD_PACKAGE_MANAGER_CLI:-true}
            tags:
                - ${REGISTRY:-localhost:5000}/${SERVICE_NAME:-mows-manager}
                - mows-manager
        init: true # without this the mows manager can't start a pty process
        networks:
            mows-manager:
                ipv4_address: "192.168.112.3"
                mac_address: "02:42:c0:a8:70:03"
            mows-manager-local:
        dns:
            - "192.168.112.3"
        cap_add:
            - "NET_ADMIN"
        env_file:
            - .env
            - secrets.env
        ports:
            - "::1:${WEB_PORT}:3000" # web ui
            - "::1:6669:6669" # tokio console
            - "::1:8001:8001" # kubectl proxy
            - "::1:8080:8080" # helm dashboard or other manually forwarded ui
            - "::1:53:53" # dns
            - "::1:10000-10009:10000-10009" # ustreamer
        privileged: true
        volumes:
            - ./temp/manager:/temp/:rw
            - ./misc/internal-config.yml:/internal-config.yml:ro
            - ./install:/install:ro
            - ../packages/:/packages/
            - ../operators/:/operators/
            - ../apis/:/apis/
            - /etc/resolv.conf:/etc/host-resolv.conf:ro
            - /dev:/dev:rw
            - /run/udev:/run/udev:ro
        environment:
            WEB_PORT: ${WEB_PORT}
            LIBVIRT_DEFAULT_URI: qemu+tcp://qemu/system # qemu+tcp://localhost/system
            #- RUST_BACKTRACE=full
            RUST_LOG: manager=debug,mows_package_manager=info,tower_http=debug,axum::rejection=trace,tokio=debug,runtime=debug,russh=error,manager::config_locks=error
            EDIT_LOCAL_DNS_CONFIG: ${EDIT_LOCAL_DNS_CONFIG}
    qemu:
        image: qemu
        restart: always
        init: true
        privileged: true
        container_name: qemu
        build:
            context: "."
            dockerfile: docker/qemu.Dockerfile
        ports:
            - "::1:16509:16509" # qemu monitor/control
            #- "::1:5900-5999:5900-5999" # spice
            - "::1:5700-5799:5700-5799" # vnc websocket
        cap_add:
            - "NET_ADMIN"
        devices:
            - "/dev/kvm"
        networks:
            mows-manager:
                ipv4_address: "192.168.112.4"
    mows-dev-local-registry:
        image: registry:2@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
        container_name: mows-dev-local-registry
        restart: always
        ports:
            - "::1:5000:5000"
        volumes:
            - ./temp/registries/local:/var/lib/registry:rw
        networks:
            mows-manager:
                ipv4_address: "192.168.112.5"

    # Single multi-upstream pull-through cache for docker.io, quay.io, gcr.io,
    # registry.k8s.io and ghcr.io. K3s' embedded containerd selects the upstream
    # via the `?ns=<host>` query parameter, which oci-registry routes through the
    # `namespace` entries in oci-registry-upstreams.yaml.
    mows-dev-pull-through-cache:
        image: mcronce/oci-registry:v0.4.5@sha256:09519cd7bd2f8da6130062b8e1d3dbf57a0dcff599eb26e8a5d12ce5317fcb91
        container_name: mows-dev-pull-through-cache
        restart: always
        command:
            - "--listen=0.0.0.0:5000"
            - "--upstream-config-file=/config/upstreams.yaml"
            - "filesystem"
            - "--root=/var/lib/oci-registry"
        networks:
            mows-manager:
                ipv4_address: "192.168.112.6"
        volumes:
            - ./misc/oci-registry-upstreams.yaml:/config/upstreams.yaml:ro
            - ./temp/registries/oci-registry:/var/lib/oci-registry:rw

volumes:
    mows-dev-local-registry:
        name: mows-dev-local-registry

networks:
    mows-manager:
        name: mows-manager
        driver: bridge
        ipam:
            driver: default
            config:
                - subnet: 192.168.112.0/24
                  gateway: "192.168.112.1"
        driver_opts:
            com.docker.network.bridge.name: mows-manager
            com.docker.network.container_iface_prefix: mows-manager
    mows-manager-local:
        name: mows-manager-local
        external: true
